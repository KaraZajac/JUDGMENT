question: 1. When the federal government submits a permit application to continue disposing of hazardous waste,
  does that submission count as a final, reviewable government decision under federal law? 2. Before submitting
  that permit application, must the federal government first conduct the broad environmental review that federal
  law generally requires—even though the hazardous waste permitting process already includes its own, more limited
  environmental review?
