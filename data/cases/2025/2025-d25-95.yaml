question: 1. When the government takes property for tax debt, does the Fifth Amendment require compensation based
  on the property’s true fair market value, or only on the lower amount it sold for at a tax foreclosure auction?
  2. Does the Eighth Amendment’s Excessive Fines Clause prohibit the government from seizing and keeping a property
  worth far more than the small tax debt owed on it?
