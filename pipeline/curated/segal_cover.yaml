# Segal-Cover scores: perceived ideology and qualifications of Supreme Court
# nominees at nomination, content-analyzed from pre-confirmation newspaper
# editorials. Ideology: 0 = most conservative, 1 = most liberal.
# Source: Segal & Cover 1989 (APSR 83:557-565) and Segal's published updates,
# via the maintained public table; values are nomination-time constants, so
# they are cert-stage-knowable for every case the justice ever hears.
# Conventions: one entry per PERSON at first confirmed nomination (Rehnquist
# uses his 1972 associate nomination, not the 1986 chief renomination, since
# the cold-start his score anchors is 1972-74; Stone's entry is his 1941
# chief elevation - the only one the table covers - though he served from
# 1925). Goldberg's year corrected to his actual 1962 nomination. KBJackson
# has no published score and stays honestly absent (missing-value handling).
# Keyed by SCDB justiceName. Hand-checked 2026-07-06.

