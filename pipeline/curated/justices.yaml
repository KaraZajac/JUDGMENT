# Hand-curated background for every justice of the SCDB modern era (all justices
# serving during the 1946+ terms), keyed by SCDB justiceName mnemonic. Merged into
# data/justices/<slug>.yaml by pipeline.build (service: + bio: blocks).
#
# Conventions: dates are quoted YYYY-MM-DD strings; `party` is the party of the
# appointing president; `confirmation_vote` is the Senate floor vote ("voice" when
# confirmed by voice vote); fields are omitted rather than guessed. Sitting
# justices have no `ended`/`end_reason`.
#
# Legacy-era justices (1791–1945 service only) are not yet curated; they receive
# mechanical names and computed records only. Enrichment from the Epstein et al.
# Justices Database is a roadmap item (docs/sources.md).

