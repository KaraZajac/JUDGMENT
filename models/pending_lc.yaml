# Provisional hand-coded ideological direction of the decision below for
# pending docket cases, following SCDB lcDispositionDirection conventions
# (see data/codebook/decision-direction.yaml). Reasoning anchor: certiorari
# petitioners lost below, so the decision below favored the respondent; the
# direction is then classified by SCDB's issue conventions (pro-civil-rights-
# claimant / pro-criminal-defendant / pro-environmental-claim / anti-business
# = liberal; the reverse = conservative).
#
# Cases with no question text or genuinely ambiguous direction are left
# uncoded (the model treats them as missing). Replaced by SCDB coding when
# the annual release covers the case. Coded 2026-07-04; the QP-less grants
# coded 2026-07-06 from party structure in supremecourt.gov docket JSONs
# (counsel of record + lower court) and CourtListener lower-court records —
# cert petitioners lost below, so direction follows from who petitioned.

