name: deploy-pages

# Builds the full static site (~29.6k pages) and publishes it to GitHub Pages
# at https://karazajac.github.io/JUDGMENT/. Runs on every push to main — which
# includes the weekly refresh and daily harvest commits, so the public site
# self-updates with new decisions, forecasts, and scores.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE: /JUDGMENT
      PAGES_SITE: https://karazajac.github.io
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build site
        working-directory: site
        run: npm ci && npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
