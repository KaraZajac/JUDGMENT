name: lc-harvest

# Daily budgeted tranche of the lower-court opinion harvest (CourtListener
# free tier: 125 requests/day; each run spends <=100, spaced 13s apart, and
# resumes from the committed manifest). Deletes itself from the schedule by
# simply finding nothing left to fetch once the 2017-2024 corpus is matched.

on:
  schedule:
    - cron: "0 9 * * *" # daily 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    env:
      COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install pyyaml
          sudo apt-get update -q && sudo apt-get install -y -q poppler-utils

      - name: Download SCDB sources (case list for matching)
        run: python -m pipeline.download

      - name: Harvest one budgeted tranche
        run: python -m pipeline.lc_opinions --harvest --start 2017 --budget 100

      - name: Refresh pending lower-court opinions (cheap, cached)
        run: python -m pipeline.lc_opinions --pending

      # decision-day pipeline: during the term, decisions land any weekday —
      # ingest them, parse same-day votes from the syllabi, refresh rollups,
      # and score any decided forecasts within 24h instead of waiting for the
      # weekly refresh
      - name: Interim ingest (new decisions, grants, schedules)
        run: python -m pipeline.interim

      - name: Same-day votes from slip-opinion syllabi (validation-gated)
        run: python -m pipeline.syllabus

      - name: Aggregates
        run: python -m pipeline.aggregates

      - name: Score decided forecasts
        run: python -m models.score

      - name: Commit changes
        run: |
          git config user.name "judgment-daily"
          git config user.email "actions@users.noreply.github.com"
          git add -A data models/output
          if git diff --cached --quiet -I'^generated:' -I'^downloaded:' -I'^  downloaded:'; then
            echo "no substantive changes"
          else
            git commit -m "chore: daily ingest + harvest (automated)"
            git push
          fi
