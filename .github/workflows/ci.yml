name: validate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline deps
        run: pip install pyyaml

      - name: Validate dataset (29k case files, structural + consistency)
        run: python -m pipeline.validate

      - name: Scorer logic self-test
        run: python -m models.score --selftest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build every site page (render test)
        working-directory: site
        run: npm ci && npm run build
